name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # This triggers the script every time you push to 'main'

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build/web # This tells GitHub to only host what's in your web folder
          branch: gh-pages  # This is the secret branch GitHub Pages uses
